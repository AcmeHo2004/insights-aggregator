# ─────────────────────────────────────────────────────────────────────────────
# BlackRock — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 150

sources:
  - name: "The Bid"
    firm: "BlackRock"
    business_unit: "Investment Institute"
    method: rss
    content_type: podcast
    url: https://rss.art19.com/the-bid
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "BlackRock Insights (web, US individual)"
    firm: "BlackRock"
    business_unit: "Investment Institute"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.blackrock.com/us/individual/insights
    tier: 2
    notes: "Bot-gated site (not circumvented); best-effort. BlackRock written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.blackrock.com/us/individual/sitemap.xml
      include:
        - /us/individual/insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
        - /tools/

  - name: "BlackRock Investment Institute (web, corporate)"
    firm: "BlackRock"
    business_unit: "Investment Institute"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.blackrock.com/corporate/insights/blackrock-investment-institute
    tier: 2
    notes: "Bot-gated site (not circumvented); best-effort. Best-effort. BlackRock written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.blackrock.com/corporate/sitemap.xml
      include:
        - /corporate/insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
