# ─────────────────────────────────────────────────────────────────────────────
# BlackRock — investment-insights source definitions
#
# Coverage (to the JPM/GS standard): podcast + written insights + outlooks.
#   • Podcast  — "The Bid" (BlackRock's flagship, Art19 RSS).
#   • Insights + Outlook — BlackRock Investment Institute commentary, market
#     insights and the quarterly Investment Outlook, via the public
#     blackrock.com/us/individual sitemap (one source covers all three —
#     the BII outlook + weekly commentary live under /insights/).
#
# Only publicly accessible content; browser UA, no auth/paywall bypass.
# NOTE: blackrock.com (Akamai) serves full pages to residential IPs but may
# throttle datacenter IPs — the web source reliably refreshes on local scans;
# the podcast (Art19 CDN) always auto-updates. Seeded locally.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 120   # BlackRock publishes ~95 current insights+outlooks; capture the full set

sources:
  - name: "The Bid"
    firm: "BlackRock"
    business_unit: "Investment Institute"
    method: rss
    content_type: podcast
    url: https://rss.art19.com/the-bid
    tier: 1
    notes: "BlackRock's flagship podcast (markets, macro, alternatives). Art19 RSS — verified."

  - name: "BlackRock Insights & Outlook (web)"
    firm: "BlackRock"
    business_unit: "Investment Institute"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.blackrock.com/us/individual/insights
    tier: 1
    notes: "BII commentary + market insights + quarterly Investment Outlook (the BII outlook & weekly commentary live under /insights/). Public sitemap; videos & retirement-product pages excluded."
    params:
      sitemap_url: https://www.blackrock.com/us/individual/sitemap.xml
      include:
        - /us/individual/insights/
      exclude:
        - /video/          # wellness-training / product explainer videos (noise)
        - /retirement/     # retirement-product education (noise)
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
        - /tools/
