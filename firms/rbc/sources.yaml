# ─────────────────────────────────────────────────────────────────────────────
# RBC Capital Markets — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 3000

sources:
  - name: "Macro Minutes"
    firm: "RBC Capital Markets"
    business_unit: "Research"
    method: rss
    content_type: podcast
    url: https://feeds.captivate.fm/rbc-macro-minutes/
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "RBC's Markets in Motion"
    firm: "RBC Capital Markets"
    business_unit: "Research"
    method: rss
    content_type: podcast
    url: https://feeds.captivate.fm/rbcs-markets-in-motion/
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "Strategic Alternatives"
    firm: "RBC Capital Markets"
    business_unit: "Research"
    method: rss
    content_type: podcast
    url: https://feeds.captivate.fm/strategic-alternatives/
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "RBC CM Insights & Outlook (web)"
    firm: "RBC Capital Markets"
    business_unit: "Research"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.rbccm.com/en/insights
    tier: 2
    notes: "Best-effort. RBC Capital Markets written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.rbccm.com/sitemap.xml
      include:
        - /en/insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
