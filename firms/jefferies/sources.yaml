# ─────────────────────────────────────────────────────────────────────────────
# Jefferies — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 3000

# Known firm-owned podcasts whose public RSS feed URL was NOT resolvable during
# recon (only an Apple Podcasts id found). Resolve via the iTunes lookup API
# (itunes.apple.com/lookup?id=<id> -> feedUrl) once network access allows, then
# add as rss sources. Not fabricated here:
#   - Jefferies EMEA Market Minutes  (apple_id: 1509334191)

sources:
  - name: "Jefferies Insights & Quarterly (web)"
    firm: "Jefferies"
    business_unit: "Insights"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.jefferies.com/insights/
    tier: 1
    notes: "Jefferies written insights & market views (jefferies.com/insights/, ~200+ articles via the WordPress sitemap)."
    params:
      sitemap_url: https://www.jefferies.com/sitemap.xml
      include:
        - /insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
