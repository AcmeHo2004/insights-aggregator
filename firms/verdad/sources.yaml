# ─────────────────────────────────────────────────────────────────────────────
# Verdad — investment-insights source definitions (Hedge Fund)
# Dan Rasmussen's free weekly quant-value research. Articles live under /archive/
# on the public sitemap (Squarespace; real dates via JSON-LD).
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 150

sources:
  - name: "Verdad Weekly Research"
    firm: "Verdad"
    business_unit: "Research"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://verdadcap.com/archive
    tier: 1
    notes: "Verdad (Dan Rasmussen) weekly quant-value research via public sitemap (/archive/)."
    params:
      sitemap_url: https://verdadcap.com/sitemap.xml
      include:
        - /archive/
      exclude:
        - /legal
        - /privacy
