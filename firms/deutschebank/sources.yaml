# ─────────────────────────────────────────────────────────────────────────────
# Deutsche Bank — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 150

# Known firm-owned podcasts whose public RSS feed URL was NOT resolvable during
# recon (only an Apple Podcasts id found). Resolve via the iTunes lookup API
# (itunes.apple.com/lookup?id=<id> -> feedUrl) once network access allows, then
# add as rss sources. Not fabricated here:
#   - Behind the Headlines (DB Research)  (apple_id: unknown)

sources:
  - name: "Podzept"
    firm: "Deutsche Bank"
    business_unit: "Research"
    method: rss
    content_type: podcast
    url: https://www.dbresearch.com/PROD/RPS_EN-PROD/RSS_PODCAST.calias
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "PERSPECTIVES Weekly"
    firm: "Deutsche Bank"
    business_unit: "Research"
    method: rss
    content_type: podcast
    url: https://feeds.captivate.fm/cio-weekly-investment-o/
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "Deutsche Bank Wealth CIO Insights (web)"
    firm: "Deutsche Bank"
    business_unit: "Wealth CIO"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://wealth.db.com/en/insights/investing-insights.html
    tier: 2
    notes: "Best-effort. Deutsche Bank written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://wealth.db.com/sitemap.xml
      include:
        - /en/insights/investing-insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
