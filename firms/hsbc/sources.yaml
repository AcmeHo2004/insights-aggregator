# ─────────────────────────────────────────────────────────────────────────────
# HSBC — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 60

sources:
  - name: "The Macro Brief"
    firm: "HSBC"
    business_unit: "Global Research"
    method: rss
    content_type: podcast
    url: https://feeds.acast.com/public/shows/6476e27317ed970011e62580
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "Under the Banyan Tree"
    firm: "HSBC"
    business_unit: "Global Research"
    method: rss
    content_type: podcast
    url: https://feeds.acast.com/public/shows/64db93c01796c400110e0ce3
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "HSBC Global Viewpoint"
    firm: "HSBC"
    business_unit: "Global Research"
    method: rss
    content_type: podcast
    url: https://feeds.acast.com/public/shows/hsbc-global-viewpoint-banking-and-markets
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "HSBC Global Research (web)"
    firm: "HSBC"
    business_unit: "Global Research"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.gbm.hsbc.com/en-gb/campaigns/global-research
    tier: 2
    notes: "Best-effort. HSBC written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.gbm.hsbc.com/sitemap.xml
      include:
        - /insights/global-research/
        - /en-gb/campaigns/global-research/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/

  - name: "HSBC Private Bank Outlook (web)"
    firm: "HSBC"
    business_unit: "Private Bank"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.privatebanking.hsbc.com/media-releases-and-news/
    tier: 2
    notes: "Best-effort. HSBC written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.privatebanking.hsbc.com/sitemap.xml
      include:
        - /media-releases-and-news/
        - /investment-services/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
