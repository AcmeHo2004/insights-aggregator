# ─────────────────────────────────────────────────────────────────────────────
# BNP Paribas — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 60

sources:
  - name: "Talking Heads"
    firm: "BNP Paribas"
    business_unit: "Asset Management"
    method: rss
    content_type: podcast
    url: https://feed.ausha.co/ykJO8CqWAZnW
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "Investment Insights"
    firm: "BNP Paribas"
    business_unit: "Asset Management"
    method: rss
    content_type: podcast
    url: https://feed.ausha.co/BMAVlT5xZdZ3
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "BNPP AM Insights & Outlook (web)"
    firm: "BNP Paribas"
    business_unit: "Asset Management"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.bnpparibas-am.com/en/how-we-think/insights/
    tier: 2
    notes: "Best-effort. BNP Paribas written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.bnpparibas-am.com/sitemap.xml
      include:
        - /en/how-we-think/insights/
        - /en/portfolio-perspectives/
        - /en/forward-thinking/
        - /en/investment-outlook-2026/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
