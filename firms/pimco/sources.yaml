# ─────────────────────────────────────────────────────────────────────────────
# PIMCO — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 120   # PIMCO publishes ~200 insights incl. the flagship Cyclical/Secular Outlooks

sources:
  - name: "PIMCO Pod"
    firm: "PIMCO"
    business_unit: "Asset Management"
    method: rss
    content_type: podcast
    url: https://feeds.megaphone.fm/pimcopod
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "PIMCO Insights & Outlooks (web)"
    firm: "PIMCO"
    business_unit: "Asset Management"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.pimco.com/us/en/insights
    tier: 1
    notes: "PIMCO Insights + the flagship Cyclical & Secular Outlooks (thematic slugs, e.g. 'reaching-for-resilience'). Public sitemap; real datePublished via JSON-LD. Podcast episode pages excluded (covered by the PIMCO Pod RSS)."
    params:
      sitemap_url: https://www.pimco.com/us/en/sitemap.xml
      include:
        - /us/en/insights/
      exclude:
        - /us/en/insights/podcasts/   # dup of the PIMCO Pod RSS feed
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
