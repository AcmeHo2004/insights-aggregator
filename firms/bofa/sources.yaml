# ─────────────────────────────────────────────────────────────────────────────
# Bank of America — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 3000

sources:
  - name: "Global Research Unlocked"
    firm: "Bank of America"
    business_unit: "Global Research"
    method: rss
    content_type: podcast
    url: https://feed.podbean.com/bofaglobalresearch/feed.xml
    tier: 1
    notes: "feed URL verified in public listings."

  # BofA Private Bank (the wealth-management division) — written insights & CIO views.
  - name: "BofA Private Bank Insights (web)"
    firm: "Bank of America"
    business_unit: "Private Bank"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.privatebank.bankofamerica.com/articles.html
    tier: 1
    notes: "BofA Private Bank (wealth) written insights & CIO market views via public sitemap (~175 articles). BofA Global Research (the IB/research division) is institutional-gated — that division is covered by the 'Global Research Unlocked' podcast above."
    params:
      sitemap_url: https://www.privatebank.bankofamerica.com/sitemap.xml
      include:
        - /articles/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
