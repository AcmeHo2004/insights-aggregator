# ─────────────────────────────────────────────────────────────────────────────
# DoubleLine — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 60

sources:
  - name: "DoubleLine Minutes"
    firm: "DoubleLine"
    business_unit: "Markets & Insights"
    method: rss
    content_type: podcast
    url: https://feed.podbean.com/dline-minutes/feed.xml
    tier: 1
    notes: "feed URL inferred from the host's known slug pattern — confirm on first run."

  - name: "The Sherman Show"
    firm: "DoubleLine"
    business_unit: "Markets & Insights"
    method: rss
    content_type: podcast
    url: https://feed.podbean.com/doubleline-the-sherman-show/feed.xml
    tier: 1
    notes: "feed URL inferred from the host's known slug pattern — confirm on first run."

  - name: "DoubleLine Market Insights & Outlooks (web)"
    firm: "DoubleLine"
    business_unit: "Markets & Insights"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://doubleline.com/markets-insights/
    tier: 2
    notes: "Best-effort. DoubleLine written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://doubleline.com/sitemap.xml
      include:
        - /markets-insights/
        - /funds-insights/
        - /category/commentary/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
