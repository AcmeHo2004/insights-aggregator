# ─────────────────────────────────────────────────────────────────────────────
# Société Générale — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 3000

sources:
  - name: "2050 Investors"
    firm: "Société Générale"
    business_unit: "Cross Asset Research"
    method: rss
    content_type: podcast
    url: https://feed.ausha.co/yv1Y4t78DAeo
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "SG Cross Asset Research (web)"
    firm: "Société Générale"
    business_unit: "Cross Asset Research"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://insight-public.sgmarkets.com/insights
    tier: 2
    notes: "Best-effort. Société Générale written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://insight-public.sgmarkets.com/sitemap.xml
      include:
        - /insights
        - /videos
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/

  - name: "SG Wholesale Banking News & Insights (web)"
    firm: "Société Générale"
    business_unit: "Wholesale Banking"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://wholesale.banking.societegenerale.com/en/news-insights/
    tier: 2
    notes: "Best-effort. Société Générale written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://wholesale.banking.societegenerale.com/sitemap.xml
      include:
        - /en/news-insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
