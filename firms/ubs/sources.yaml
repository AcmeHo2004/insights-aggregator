# ─────────────────────────────────────────────────────────────────────────────
# UBS — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 60

sources:
  - name: "UBS On-Air: Market Moves"
    firm: "UBS"
    business_unit: "Chief Investment Office"
    method: rss
    content_type: podcast
    url: https://www.ubs.com/us/en/wealth-management/insights/podcasts/_jcr_content/mainpar/toplevelgrid_1112494256/col1/tabteaser/tabteasersplit/innergrid/xcol1/responsivepodcast_co.rss20.xml
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "UBS CIO Insights (web, global)"
    firm: "UBS"
    business_unit: "Chief Investment Office"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.ubs.com/global/en/wealthmanagement/insights.html
    tier: 2
    notes: "Best-effort. UBS written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.ubs.com/global/en/sitemap.xml
      include:
        - /global/en/wealthmanagement/insights/
        - /global/en/wealthmanagement/chief-investment-office
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/

  - name: "UBS Insights (web, US)"
    firm: "UBS"
    business_unit: "Chief Investment Office"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.ubs.com/us/en/wealth-management/insights.html
    tier: 2
    notes: "Best-effort. UBS written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.ubs.com/us/en/sitemap.xml
      include:
        - /us/en/wealth-management/insights/
        - /us/en/wealth-management/year-ahead
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
