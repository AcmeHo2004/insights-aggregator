# ─────────────────────────────────────────────────────────────────────────────
# UBS — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage: the firm's flagship podcast(s) (native RSS) and written insights via the public sitemap (sitemap_articles adapter).
#
# Only publicly accessible content; the adapters send a normal browser UA and do
# NOT bypass auth, paywalls or bot-gating. Per-source failures are isolated, so a
# gated/403 source simply yields no items (revisit once a live CI run confirms).
# NOTE: sitemap_url below is best-effort (the exact public XML sitemap was not
#       confirmable during recon); verify/adjust after the first CI run.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 150

sources:
  - name: "UBS On-Air: Market Moves"
    firm: "UBS"
    business_unit: "Wealth Management"
    method: rss
    content_type: podcast
    url: https://www.ubs.com/us/en/wealth-management/insights/podcasts/_jcr_content/mainpar/toplevelgrid_1112494256/col1/tabteaser/tabteasersplit/innergrid/xcol1/responsivepodcast_co.rss20.xml
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "UBS Insights (web)"
    firm: "UBS"
    business_unit: "Wealth Management"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.ubs.com/global/en/wealthmanagement/insights.html
    tier: 2
    notes: "Best-effort. UBS insights via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.ubs.com/sitemap.xml
      include:
        - /global/en/wealthmanagement/insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
