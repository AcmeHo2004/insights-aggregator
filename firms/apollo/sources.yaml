# ─────────────────────────────────────────────────────────────────────────────
# Apollo — investment-insights source definitions
#
# Coverage (JPM/GS standard): podcast + Torsten Slök's Daily Spark + insights +
# outlook.
#   • Podcast — "The View From Apollo".
#   • Daily Spark (Torsten Slök, Apollo's flagship macro) + Apollo Academy notes
#     via apolloacademy.com WordPress RSS feeds (native RSS → auto-updates in the
#     cloud, no scraping needed).
#   • Apollo corporate insights + outlooks via the apollo.com public sitemap.
#
# Only publicly accessible content; browser UA, no auth/paywall bypass.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 3000

sources:
  - name: "The View From Apollo"
    firm: "Apollo"
    business_unit: "Insights"
    method: rss
    content_type: podcast
    url: https://feeds.blubrry.com/feeds/TheViewFromApollo.xml
    tier: 1
    notes: "Apollo's markets/credit podcast (Blubrry RSS) — verified."

  - name: "Apollo Academy"
    firm: "Apollo"
    business_unit: "Insights"
    method: rss
    content_type: article
    url: https://www.apolloacademy.com/feed/
    tier: 1
    notes: "Apollo Academy written insights (Torsten Slök's team — private credit / PE / real estate / macro). WordPress RSS (auto-updates). Note: this feed omits dates, so items sort by first-seen."

  - name: "Apollo Insights & Outlook (web)"
    firm: "Apollo"
    business_unit: "Insights"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.apollo.com/insights-news/insights
    tier: 2
    notes: "Apollo corporate written insights + outlooks via public sitemap (depth/history beyond the RSS feeds)."
    params:
      sitemap_url: https://www.apollo.com/sitemap.xml
      include:
        - /insights-news/insights/
        - /outlook
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
