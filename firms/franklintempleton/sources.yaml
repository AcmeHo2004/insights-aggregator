# ─────────────────────────────────────────────────────────────────────────────
# Franklin Templeton — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 150

sources:
  - name: "Talking Markets"
    firm: "Franklin Templeton"
    business_unit: "Asset Management"
    method: rss
    content_type: podcast
    url: https://franklintempletontalkingmarkets.libsyn.com/rss
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "Franklin Templeton Articles & Podcasts (web)"
    firm: "Franklin Templeton"
    business_unit: "Asset Management"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.franklintempleton.com/articles
    tier: 2
    notes: "Best-effort. Franklin Templeton written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.franklintempleton.com/sitemap.xml
      include:
        - /articles/
        - /insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/

  - name: "FT Institute Outlooks (web)"
    firm: "Franklin Templeton"
    business_unit: "FT Institute"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.ftinstitutional.com/insights/
    tier: 2
    notes: "Best-effort. Franklin Templeton written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.ftinstitutional.com/sitemap.xml
      include:
        - /insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
