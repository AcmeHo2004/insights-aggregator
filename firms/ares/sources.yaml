# ─────────────────────────────────────────────────────────────────────────────
# Ares Management — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 60

sources:
  - name: "Ares Perspectives & Outlooks (web)"
    firm: "Ares Management"
    business_unit: "Perspectives"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.aresmgmt.com/news-views/perspectives
    tier: 1
    notes: "Best-effort. Ares Management written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.aresmgmt.com/sitemap.xml
      include:
        - /news-views/perspectives
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/

  - name: "Ares Wealth Insights (web)"
    firm: "Ares Management"
    business_unit: "Wealth Mgmt Solutions"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.areswms.com/ares-insights
    tier: 1
    notes: "Best-effort. Ares Management written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.areswms.com/sitemap.xml
      include:
        - /ares-insights
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
