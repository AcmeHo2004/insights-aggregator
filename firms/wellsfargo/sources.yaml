# ─────────────────────────────────────────────────────────────────────────────
# Wells Fargo — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 150

sources:
  - name: "WFII Research & Commentary (web)"
    firm: "Wells Fargo"
    business_unit: "Investment Institute"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.wellsfargoadvisors.com/research-analysis.htm
    tier: 1
    notes: "Best-effort. Wells Fargo written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.wellsfargoadvisors.com/sitemap.xml
      include:
        - /research-analysis
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/

  - name: "Wells Fargo CIB Insights (web)"
    firm: "Wells Fargo"
    business_unit: "CIB"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.wellsfargo.com/cib/insights/
    tier: 1
    notes: "Best-effort. Wells Fargo written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.wellsfargo.com/sitemap.xml
      include:
        - /cib/insights/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
