# ─────────────────────────────────────────────────────────────────────────────
# Schroders — investment-insights source definitions
#
# Sibling project to the other firms/ scanners. Coverage aims to be COMPLETE:
# every firm-owned podcast (native RSS) + every distinct written-insight
# section and market-outlook page (via the sitemap_articles adapter, one web
# source per content domain, each listing all relevant include paths).
#
# Only publicly accessible content; adapters send a normal browser UA and do
# NOT bypass auth/paywalls/bot-gating. Per-source failures are isolated.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  enrich_window_days: 60
  max_enrich_per_feed: 8
  llm_model: claude-haiku-4-5
  cluster_window_days: 3
  web_max_new_per_run: 60

sources:
  - name: "The Investor Download"
    firm: "Schroders"
    business_unit: "Insights"
    method: rss
    content_type: podcast
    url: https://schroders.podbean.com/feed.xml
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "The Value Perspective"
    firm: "Schroders"
    business_unit: "Insights"
    method: rss
    content_type: podcast
    url: https://schroderstvp.podbean.com/feed.xml
    tier: 1
    notes: "feed URL verified in public listings."

  - name: "Schroders Insights & Outlook (web)"
    firm: "Schroders"
    business_unit: "Insights"
    method: scrape
    adapter: sitemap_articles
    content_type: article
    url: https://www.schroders.com/en-us/us/individual/insights/
    tier: 2
    notes: "Best-effort. Schroders written insights + outlooks via public sitemap; per-source failure isolated."
    params:
      sitemap_url: https://www.schroders.com/sitemap.xml
      include:
        - /insights/
        - /outlook/
      exclude:
        - /literature/
        - /forms/
        - /legal/
        - /sign-in
        - /content/
