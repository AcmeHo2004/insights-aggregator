name: Update & deploy

on:
  schedule:
    - cron: "0 * * * *"      # hourly (top of the hour, UTC)
  workflow_dispatch: {}        # allow manual runs

# one run at a time; let an in-progress deploy finish
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write              # push the built site to `gh-pages` + DBs to `data`

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45          # hard cap — a run can never hang for hours again
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Firms are auto-discovered from firms/*/ — adding or removing a firm
      # needs NO edits here (package name is always <dir>_insights).
      - name: Restore previous databases (from the data branch)
        run: |
          git fetch origin data --depth=1 2>/dev/null || echo "no data branch yet (first run)"
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            for d in firms/*/; do
              git checkout origin/data -- "${d}data/insights.db" 2>/dev/null || true
            done
          fi
          for d in firms/*/; do ls -lh "${d}data/insights.db" 2>/dev/null || echo "${d} fresh (will rebuild)"; done

      - name: Scan firms (ingest new + enrich with Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for d in firms/*/; do
            f=$(basename "$d")
            ( cd "$d" && python -m "${f}_insights" scan ) || echo "$f scan had errors (continuing)"
          done

      - name: Build static site
        run: python build_static.py

      - name: Deploy to gh-pages
        run: |
          cd site
          git init -q
          git checkout -b gh-pages
          git add -A
          git -c user.name="insights-bot" -c user.email="insights-bot@users.noreply.github.com" commit -q -m "deploy $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Persist databases (single-commit data branch)
        run: |
          git config user.name "insights-bot"
          git config user.email "insights-bot@users.noreply.github.com"
          git checkout --orphan data-snapshot
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f firms/*/data/insights.db
          git commit -m "data snapshot $(date -u +%FT%TZ)" >/dev/null
          git push -f origin data-snapshot:data
